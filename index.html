<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Побег от Наталии</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-glass: rgba(255, 255, 255, 0.9);
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background: #f3f4f6; 
            font-family: 'Inter', -apple-system, sans-serif; 
            touch-action: none; 
        }

        canvas { display: block; }

        /* Игровой интерфейс */
        #score { 
            position: fixed; top: 20px; left: 20px; 
            font-size: 22px; font-weight: 800; z-index: 2; 
            color: var(--text-main); background: var(--bg-glass);
            padding: 8px 16px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            pointer-events: none;
        }

        #slowStatus { 
            position: fixed; top: 20px; right: 20px; 
            font-size: 18px; font-weight: bold; color: #2563eb; 
            display: none; z-index: 2; background: var(--bg-glass);
            padding: 8px 16px; border-radius: 12px; border: 2px solid #bfdbfe;
        }

        #freezeOverlay {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            font-size: 120px; pointer-events: none; z-index: 5; opacity: 0;
        }

        /* Оверлеи и Меню */
        .overlay { 
            position: fixed; inset: 0; 
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; gap: 20px; z-index: 10; padding: 24px; 
        }

        .menu-card {
            background: var(--bg-glass);
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 340px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
            text-align: center;
        }

        h1 { font-size: 28px; margin: 0 0 10px 0; color: var(--text-main); letter-spacing: -0.5px; }

        button { 
            width: 100%;
            padding: 14px 20px; 
            font-size: 16px; font-weight: 700;
            cursor: pointer; border: none; 
            background: #374151; color: white; 
            border-radius: 14px; transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-top: 5px;
        }

        button:hover { transform: translateY(-2px); }
        button:active { transform: scale(0.98); }
        button:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }

        .btn-play { background: #10b981; }
        .btn-play:hover { background: #059669; }

        .btn-tg { background: #0088cc !important; }

        input { 
            width: 100%; box-sizing: border-box;
            padding: 14px; font-size: 16px; 
            border: 2px solid #e5e7eb; border-radius: 14px; 
            outline: none; transition: border-color 0.2s;
            background: rgba(255,255,255,0.8);
            margin-bottom: 12px;
        }
        input:focus { border-color: var(--primary); }

        .table-container { 
            width: 100%; background: white; border-radius: 16px; 
            overflow: hidden; border: 1px solid #e5e7eb;
            margin-top: 10px;
        }
        .leaderboard-table { width: 100%; border-collapse: collapse; }
        .leaderboard-table thead { background: #f9fafb; color: var(--text-muted); font-size: 12px; text-transform: uppercase; }
        .leaderboard-table th { padding: 12px; text-align: left; }
        .leaderboard-table td { padding: 14px 12px; border-top: 1px solid #f3f4f6; font-size: 15px; }

        /* Стили Магазина */
        .shop-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; font-size: 13px; background: #e5e7eb; color: var(--text-main); border-radius: 10px; margin: 0; }
        .tab-btn.active { background: var(--primary); color: white; }

        .shop-item {
            display: flex; align-items: center; gap: 15px;
            background: white; padding: 12px; border-radius: 16px;
            margin-bottom: 10px; border: 1px solid #e5e7eb;
        }
        .shop-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .shop-info { flex: 1; text-align: left; }
        .shop-name { font-weight: 700; font-size: 14px; color: var(--text-main); }
        .shop-price { font-size: 12px; color: #b45309; font-weight: 600; }
        .btn-buy-small { width: auto; padding: 8px 12px; font-size: 12px; margin: 0; }

        /* Roulette Styles */
        .roulette-container {
            background: linear-gradient(135deg, #fefce8 0%, #fff7ed 100%);
            border-radius: 16px; padding: 16px; border: 2px solid #fbbf24; margin-bottom: 15px;
        }
        #rouletteResult { 
            height: 80px; display: flex; align-items: center; justify-content: center; margin: 10px 0; 
        }
        .roulette-img {
            width: 70px; height: 70px; border-radius: 50%; border: 3px solid #fbbf24; 
            object-fit: cover; animation: bounce 0.5s infinite alternate;
        }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* Статусы */
        .status-container {
            display: flex; flex-direction: column; align-items: center; gap: 5px; margin-bottom: 15px;
        }
        .macrame-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: #fef3c7; color: #92400e; padding: 4px 12px;
            border-radius: 20px; font-size: 15px; font-weight: 700;
            border: 1px solid #fde68a;
        }
        .boost-timer-active { font-size: 12px; color: #ef4444; font-weight: 800; animation: pulse 1s infinite; }

        .online-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: #dcfce7; color: #166534; padding: 4px 12px;
            border-radius: 20px; font-size: 13px; font-weight: 600;
        }
        .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="score">Очки: 0</div>
<div id="slowStatus">❄️ <span id="slowFrames">0</span></div>
<div id="freezeOverlay">🥶</div>

<div id="menu" class="overlay">
    <div class="menu-card">
        <div class="status-container">
            <div id="macrameStats" class="macrame-badge" style="display: none;">
                <span id="boostIcon" style="display:none; margin-right:4px;">🔥</span>
                🧶 <span id="macrameCount">0</span>
            </div>
            <div id="activeBoostTimer" class="boost-timer-active" style="display:none">x2🧶: <span id="bTime">0:00</span></div>
            
            <div class="online-badge">
                <span class="online-dot"></span>
                Онлайн: <span id="onlineCount">...</span>
            </div>
        </div>

        <h1 id="mainTitle">Побег от Наталии 😈</h1>
        
        <div id="authSection">
            <input id="loginName" type="text" placeholder="Придумайте ник" maxlength="15">
            <input id="loginPass" type="password" placeholder="Пароль">
            <p id="authError" style="color: #ef4444; font-size: 12px; margin: -5px 0 10px 0; display: none;"></p>
            <button onclick="handleAuth()">Войти / Регистрация</button>
        </div>

        <div id="gameSection" style="display: none;">
            <p style="margin: 0 0 15px 0; color: var(--text-muted)">Привет, <b id="welcomeText" style="color: var(--text-main)"></b>!</p>
            <button onclick="startGame()" class="btn-play">ИГРАТЬ</button>
            <button onclick="openShop()">🛒 Магазин</button>
            <button onclick="showLeaderboard()">🏆 Лидеры</button>
            <button onclick="logout()" style="background: transparent; color: #9ca3af; box-shadow: none; font-size: 12px; text-decoration: underline;">Сменить аккаунт</button>
        </div>
    </div>
    
    <a href="https://t.me/+godxyKIhKEs3Zjhi" target="_blank" style="text-decoration: none; width: 100%; max-width: 340px;">
        <button class="btn-tg">📢 Наш Telegram</button>
    </a>
</div>

<div id="shop" class="overlay" style="display: none;">
    <div class="menu-card" style="max-width: 360px;">
        <div class="shop-tabs">
            <button id="tabSkins" class="tab-btn active" onclick="renderShop('skins')">Скины</button>
            <button id="tabBoosts" class="tab-btn" onclick="renderShop('boosts')">Бустеры</button>
        </div>
        <div id="shopList" style="max-height: 380px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px;"></div>
        <button onclick="closeShop()">Назад</button>
    </div>
</div>

<div id="leaderboard" class="overlay" style="display: none;">
    <div class="menu-card" style="max-width: 400px;">
        <h2>🏆 Рекорды</h2>
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <button id="btnRec" onclick="loadTab('score')" style="font-size: 11px;">РЕКОРДЫ</button>
            <button id="btnSum" onclick="loadTab('total_score')" style="font-size: 11px;">СУММА</button>
        </div>
        <div class="table-container">
            <table class="leaderboard-table">
                <thead>
                    <tr><th style="width:30px">#</th><th>Игрок</th><th id="typeLabel" style="text-align:right">Очки</th></tr>
                </thead>
                <tbody id="leaderBody"></tbody>
            </table>
        </div>
        <button onclick="closeLeaderboard()">Назад</button>
    </div>
</div>

<div id="gameOver" class="overlay" style="display: none;">
    <div class="menu-card">
        <h1 id="gameOverEmoji" style="font-size: 40px;">😈</h1>
        <h2 id="gameOverTitle">Пойман!</h2>
        <p style="margin:0; color:var(--text-muted)">Начислено🧶: <b id="addedMacrame" style="color:#10b981">+0</b> <span id="boostIndicator" style="color:#f59e0b; font-weight:800"></span></p>
        <p style="font-size: 20px; color: var(--text-muted);">Результат: <b id="finalScore" style="color: var(--primary)">0</b></p>
        <button onclick="restart()" class="btn-play">ЕЩЕ РАЗ</button>
        <button onclick="backToMenu()">В МЕНЮ</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const SB_URL = "https://ffmyynrwbggefxqtkpau.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmbXl5bnJ3YmdnZWZ4cXRrcGF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTU2NDksImV4cCI6MjA5MTQzMTY0OX0.Pb3KJl6edAA_k5Ce6JlWO0Y81T-XboLVcPlvdU-T3W0";
const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
const sessionID = Math.random().toString(36).substring(7);

let playerName = "";
let currentID = null;
let totalMacrame = 0;

// Магазин
let ownedSkins = ["natalia"];
let currentSkin = "natalia";
let boostersCount = 0;
let boostUntil = null; 

const SKINS = {
    "natalia": { name: "Наталия", img: "natalia.jpg", price: 0, title: "Побег от Наталии", emoji: "😈" },
    "dmitro": { name: "Дмитро", img: "дмитро.jpg", price: 1500, title: "Побег от Дмитра", emoji: "🥸", refund: 800 },
    "budko": { name: "Будко", img: "будко.png", price: 5000, title: "Побег от Оксаны", emoji: "👺", refund: 2500 }
};

// --- СИСТЕМА БУСТОВ ---

function isBoostActive() {
    if (!boostUntil) return false;
    return new Date(boostUntil) > new Date();
}

async function buyBooster() {
    if (totalMacrame >= 1250) {
        totalMacrame -= 1250;
        boostersCount++;
        const { error } = await supabaseClient.from('leaderboard').update({ 
            macrame_points: totalMacrame, 
            boosters_count: boostersCount 
        }).eq('id', currentID);
        
        if(!error) {
            updateMacrameUI();
            renderShop('boosts');
        }
    } else { alert("Недостаточно макраме!"); }
}

async function activateBooster() {
    if (boostersCount <= 0) return;
    
    let now = new Date();
    let baseTime = isBoostActive() ? new Date(boostUntil) : now;
    let newEnd = new Date(baseTime.getTime() + (7 * 60 * 1000));
    
    boostersCount--;
    boostUntil = newEnd.toISOString();

    const { error } = await supabaseClient.from('leaderboard').update({ 
        boosters_count: boostersCount,
        boost_until: boostUntil
    }).eq('id', currentID);

    if(!error) {
        updateMacrameUI();
        renderShop('boosts');
    }
}

setInterval(() => {
    const timerBox = document.getElementById("activeBoostTimer");
    const timeLabel = document.getElementById("bTime");
    const icon = document.getElementById("boostIcon");

    if (isBoostActive()) {
        const diff = new Date(boostUntil) - new Date();
        const mins = Math.floor(diff / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        timerBox.style.display = "block";
        icon.style.display = "inline";
        timeLabel.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    } else {
        timerBox.style.display = "none";
        icon.style.display = "none";
    }
}, 1000);

// --- АВТОРИЗАЦИЯ ---

async function checkAutoLogin() {
    const saved = localStorage.getItem('game_user');
    if (saved) {
        const localData = JSON.parse(saved);
        const { data: user } = await supabaseClient.from('leaderboard').select('*').eq('id', localData.id).maybeSingle();
        if (user) loginSuccess(user, true);
    }
}

async function handleAuth() {
    const name = document.getElementById("loginName").value.trim();
    const pass = document.getElementById("loginPass").value.trim();
    const err = document.getElementById("authError");
    if (name.length < 2 || pass.length < 4) { err.innerText = "Ник (2+) и пароль (4+) малы"; err.style.display = "block"; return; }
    
    const { data: user } = await supabaseClient.from('leaderboard').select('*').eq('name', name).maybeSingle();
    
    if (user) {
        if (user.password === pass) { loginSuccess(user); } 
        else { err.innerText = "Неверный пароль"; err.style.display = "block"; }
    } else {
        const { data: newUser } = await supabaseClient.from('leaderboard').insert([{ 
            name, password: pass, score: 0, total_score: 0, macrame_points: 0,
            owned_skins: ["natalia"], current_skin: "natalia", boosters_count: 0
        }]).select().single();
        loginSuccess(newUser);
    }
}

function loginSuccess(user, save = true) {
    playerName = user.name;
    currentID = user.id;
    totalMacrame = user.macrame_points || 0; 
    ownedSkins = user.owned_skins || ["natalia"];
    currentSkin = user.current_skin || "natalia";
    boostersCount = user.boosters_count || 0;
    boostUntil = user.boost_until;
    
    if (save) localStorage.setItem('game_user', JSON.stringify(user));
    
    document.getElementById("authSection").style.display = "none";
    document.getElementById("gameSection").style.display = "block";
    document.getElementById("welcomeText").innerText = playerName;
    
    updateMacrameUI();
    applySkin();
}

async function saveResults(s) {
    if (!currentID) return;
    
    const isBoosted = isBoostActive();
    const multiplier = isBoosted ? 2 : 1;
    const addedPoints = s * multiplier;

    const { data } = await supabaseClient.from("leaderboard").select("*").eq("id", currentID).single();
    
    if (data) {
        const newMacrameTotal = (data.macrame_points || 0) + addedPoints;
        const newTotalScore = (data.total_score || 0) + s;
        const newBestScore = Math.max(s, data.score || 0);

        await supabaseClient.from("leaderboard").update({ 
            score: newBestScore, 
            total_score: newTotalScore,
            macrame_points: newMacrameTotal 
        }).eq("id", currentID);
        
        totalMacrame = newMacrameTotal;
        updateMacrameUI();
        
        document.getElementById("addedMacrame").innerText = "+" + addedPoints;
        document.getElementById("boostIndicator").innerText = isBoosted ? "(x2🧶)" : "";
    }
}

function updateMacrameUI() {
    document.getElementById("macrameStats").style.display = "inline-flex";
    document.getElementById("macrameCount").innerText = totalMacrame;
}

// --- МАГАЗИН И РУЛЕТКА ---

function openShop() {
    document.getElementById("shop").style.display = "flex";
    document.getElementById("menu").style.display = "none";
    renderShop('skins');
}

let isSpinning = false;
async function spinRoulette() {
    if (isSpinning) return;
    if (totalMacrame < 2000) { alert("Недостаточно макраме (2000 🧶)"); return; }

    isSpinning = true;
    totalMacrame -= 2000;
    updateMacrameUI();
    
    const resContainer = document.getElementById("rouletteResult");
    const rouletteImgs = ["дмитро.jpg", "будко.png", "natalia.jpg"];
    let i = 0;
    
    const anim = setInterval(() => {
        resContainer.innerHTML = `<img src="${rouletteImgs[i % rouletteImgs.length]}" class="roulette-img">`;
        i++;
    }, 100);

    setTimeout(async () => {
        clearInterval(anim);
        const winId = Math.random() < 0.75 ? "dmitro" : "budko";
        const skin = SKINS[winId];
        
        resContainer.innerHTML = `<img src="${skin.img}" class="roulette-img" style="border-color: #10b981; animation: none; transform: scale(1.2);">`;

        let msg = "";
        if (ownedSkins.includes(winId)) {
            totalMacrame += skin.refund;
            msg = `Дубликат! Получено ${skin.refund} 🧶`;
        } else {
            ownedSkins.push(winId);
            msg = `Ура! Выпал ${skin.name}!`;
        }

        setTimeout(() => alert(msg), 100);

        await supabaseClient.from('leaderboard').update({ 
            macrame_points: totalMacrame, 
            owned_skins: ownedSkins 
        }).eq('id', currentID);

        isSpinning = false;
        updateMacrameUI();
        renderShop('skins');
    }, 2000);
}

function renderShop(tab) {
    const container = document.getElementById("shopList");
    container.innerHTML = "";
    document.getElementById("tabSkins").className = tab === 'skins' ? 'tab-btn active' : 'tab-btn';
    document.getElementById("tabBoosts").className = tab === 'boosts' ? 'tab-btn active' : 'tab-btn';

    if (tab === 'skins') {
        container.innerHTML = `
            <div class="roulette-container">
                <div class="shop-name" style="text-align:center; margin-bottom: 5px;">🎰 РУЛЕТКА СКИНОВ</div>
                <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; font-size: 11px; font-weight: 700;">
                    <span style="color: #4b5563; background: #fff; padding: 2px 8px; border-radius: 8px; border: 1px solid #e5e7eb;">Дмитро: 75%</span>
                    <span style="color: #4b5563; background: #fff; padding: 2px 8px; border-radius: 8px; border: 1px solid #e5e7eb;">Будко: 25%</span>
                </div>
                <div id="rouletteResult"><span style="font-size:30px">❓</span></div>
                <button onclick="spinRoulette()" style="background:#f59e0b; margin-top:0;" ${isSpinning ? 'disabled' : ''}>
                    ${isSpinning ? "КРУТИМ..." : "КРУТИТЬ ЗА 2000 🧶"}
                </button>
            </div>
            <div style="margin: 15px 0 10px 5px; font-weight: 800; font-size: 14px; color: var(--text-muted);">ВАШИ СКИНЫ:</div>
        `;

        Object.keys(SKINS).forEach(id => {
            const s = SKINS[id], isOwned = ownedSkins.includes(id), isCurrent = currentSkin === id;
            container.innerHTML += `
                <div class="shop-item">
                    <img src="${s.img}" class="shop-img">
                    <div class="shop-info">
                        <div class="shop-name">${s.name}</div>
                        <div class="shop-price">${isOwned ? "В коллекции" : s.price + " 🧶"}</div>
                    </div>
                    <button class="btn-buy-small" onclick="${isOwned ? `selectSkin('${id}')` : `buySkin('${id}')`}" ${isCurrent ? 'disabled' : ''}>
                        ${isCurrent ? "Выбрано" : (isOwned ? "Надеть" : "Купить")}
                    </button>
                </div>`;
        });
    } else {
        container.innerHTML = `
            <div class="shop-item">
                <div class="shop-info">
                    <div class="shop-name">Бустер x2 Макраме Поинтов</div>
                    <div class="shop-price">Цена: 1250 🧶 (на 7 мин)</div>
                </div>
                <button class="btn-buy-small" onclick="buyBooster()">Купить</button>
            </div>
            <div style="margin-top:15px; text-align:left; background:rgba(255,255,255,0.5); padding:15px; border-radius:12px;">
                <div style="font-weight:800; font-size:14px;">Инвентарь: ${boostersCount} шт.</div>
                <button onclick="activateBooster()" style="background:#10b981; margin-top:10px;" ${boostersCount === 0 ? 'disabled' : ''}>
                    АКТИВИРОВАТЬ
                </button>
            </div>`;
    }
}

async function buySkin(id) {
    if (totalMacrame >= SKINS[id].price) {
        totalMacrame -= SKINS[id].price;
        ownedSkins.push(id);
        await supabaseClient.from('leaderboard').update({ macrame_points: totalMacrame, owned_skins: ownedSkins }).eq('id', currentID);
        updateMacrameUI();
        renderShop('skins');
    } else { alert("Недостаточно макраме!"); }
}

async function selectSkin(id) {
    currentSkin = id;
    await supabaseClient.from('leaderboard').update({ current_skin: id }).eq('id', currentID);
    applySkin();
    renderShop('skins');
}

function applySkin() {
    const s = SKINS[currentSkin];
    enemyImg.src = s.img;
    document.getElementById("mainTitle").innerText = s.title;
    document.getElementById("gameOverEmoji").innerText = s.emoji;
}

function closeShop() { document.getElementById("shop").style.display = "none"; document.getElementById("menu").style.display = "flex"; }
function logout() { localStorage.removeItem('game_user'); location.reload(); }

// --- ОНЛАЙН ---
async function initOnline() {
    const ch = supabaseClient.channel('presence-game', { config: { presence: { key: sessionID } } });
    ch.on('presence', { event: 'sync' }, () => {
        const count = Object.keys(ch.presenceState()).length;
        document.getElementById("onlineCount").innerText = count;
    }).subscribe(async (s) => { if (s === 'SUBSCRIBED') await ch.track({ user: playerName || 'Гость' }); });
}

// --- ИГРОВАЯ ЛОГИКА ---
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let score = 0, running = false, slowTimer = 0, points = [], hasShield = false;
let player = { x: 0, y: 0, r: 25 }, enemy = { x: -200, y: -200, r: 25 };
const playerImg = new Image(); playerImg.src = "https://cdn-icons-png.flaticon.com/512/1946/1946429.png";
const enemyImg = new Image(); 

function spawnPoint() {
    const r = Math.random();
    let type = "common";
    // Тип 'shield' вместо 'rainbow' (шанс 2%)
    if (r > 0.98) type = "shield"; else if (r > 0.94) type = "green"; 
    else if (r > 0.88) type = "yellow"; else if (r > 0.80) type = "epic"; else if (r > 0.70) type = "rare";
    points.push({ x: Math.random() * (canvas.width - 50) + 25, y: Math.random() * (canvas.height - 50) + 25, r: canvas.width * 0.025, type });
}

function update() {
    if (!running) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let speed = (slowTimer > 0) ? 1.5 : (2 + score * 0.1);
    if (slowTimer > 0) {
        slowTimer--;
        document.getElementById("slowStatus").style.display = "block";
        document.getElementById("slowFrames").innerText = slowTimer;
    } else { document.getElementById("slowStatus").style.display = "none"; }

    let dx = player.x - enemy.x, dy = player.y - enemy.y, dist = Math.hypot(dx, dy);
    if (dist > 1) { enemy.x += (dx / dist) * speed; enemy.y += (dy / dist) * speed; }

    points.forEach((p, i) => {
        ctx.beginPath();
        // Визуал щита на поле — серебристый с синим контуром
        ctx.fillStyle = {common:"#8B4513", rare:"#3b82f6", yellow:"#FFD700", epic:"#a855f7", green:"#10b981", shield:"#e5e7eb"}[p.type];
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        if (p.type === "shield") { ctx.strokeStyle = "#3b82f6"; ctx.lineWidth = 2; ctx.stroke(); }

        if (Math.hypot(player.x - p.x, player.y - p.y) < player.r + p.r) {
            if (p.type === "rare" || p.type === "yellow") { slowTimer += p.type === "rare" ? 40 : 100; triggerFreeze(); }
            if (p.type === "shield") { hasShield = true; } // Активируем щит

            score += {common:1, rare:1, yellow:1, epic:3, green:5, shield:5}[p.type];
            document.getElementById("score").innerHTML = "Очки: " + score + (isBoostActive() ? " <span style='color:#f59e0b'>(x2🧶)</span>" : "");
            
            points.splice(i, 1); 
            spawnPoint(); 
        }
    });

    // Рисуем поле щита вокруг игрока
    if (hasShield) {
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r + 10, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(59, 130, 246, 0.3)";
        ctx.fill();
        ctx.strokeStyle = "rgba(59, 130, 246, 0.8)";
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    ctx.drawImage(playerImg, player.x - player.r, player.y - player.r, player.r*2, player.r*2);
    ctx.save(); ctx.beginPath(); ctx.arc(enemy.x, enemy.y, enemy.r, 0, Math.PI*2); ctx.clip();
    ctx.drawImage(enemyImg, enemy.x - enemy.r, enemy.y - enemy.r, enemy.r*2, enemy.r*2); ctx.restore();

    if (dist < player.r + enemy.r * 0.85) {
        if (hasShield) {
            // Щит спасает!
            hasShield = false;
            // Отбрасываем врага в случайный край
            const side = Math.floor(Math.random() * 4);
            if(side === 0) { enemy.x = 0; enemy.y = Math.random() * canvas.height; }
            else if(side === 1) { enemy.x = canvas.width; enemy.y = Math.random() * canvas.height; }
            else if(side === 2) { enemy.x = Math.random() * canvas.width; enemy.y = 0; }
            else { enemy.x = Math.random() * canvas.width; enemy.y = canvas.height; }
            requestAnimationFrame(update);
        } else {
            gameOver();
        }
    } else requestAnimationFrame(update);
}

function triggerFreeze() {
    const el = document.getElementById("freezeOverlay");
    el.style.opacity = "1"; el.style.transform = "scale(0.5)";
    setTimeout(() => { el.style.transition = "all 0.5s"; el.style.transform = "scale(1.5)"; el.style.opacity = "0"; }, 50);
    el.style.transition = ""; 
}

// --- ЛИДЕРЫ ---
async function showLeaderboard() {
    document.getElementById("leaderboard").style.display = "flex";
    document.getElementById("menu").style.display = "none";
    loadTab('score');
}

async function loadTab(mode) {
    const btnRec = document.getElementById("btnRec"), btnSum = document.getElementById("btnSum");
    btnRec.style.background = mode === 'score' ? "#374151" : "#e5e7eb";
    btnSum.style.background = mode === 'total_score' ? "#374151" : "#e5e7eb";
    document.getElementById("typeLabel").innerText = mode === 'score' ? "Рекорд" : "Сумма";

    const { data } = await supabaseClient.from("leaderboard").select("name, score, total_score").order(mode, { ascending: false }).limit(10);
    document.getElementById("leaderBody").innerHTML = data?.map((p, i) => `
        <tr><td>${i+1}</td><td style="font-weight:600">${p.name}</td><td style="text-align:right; font-weight:800; color:var(--primary)">${p[mode]}</td></tr>
    `).join("");
}

// --- УПРАВЛЕНИЕ ---
function startGame() {
    document.getElementById("menu").style.display = "none";
    score = 0; points = []; slowTimer = 0; enemy.x = -200; hasShield = false;
    document.getElementById("score").innerHTML = "Очки: 0" + (isBoostActive() ? " <span style='color:#f59e0b'>(x2🧶)</span>" : "");
    
    for(let i=0; i<9; i++) spawnPoint();
    
    running = true; update();
}

function gameOver() { 
    running = false; saveResults(score); 
    document.getElementById("finalScore").innerText = score; 
    document.getElementById("gameOver").style.display = "flex"; 
}

function closeLeaderboard() { document.getElementById("leaderboard").style.display = "none"; document.getElementById("menu").style.display = "flex"; }
function backToMenu() { document.getElementById("gameOver").style.display = "none"; document.getElementById("menu").style.display = "flex"; }
function restart() { document.getElementById("gameOver").style.display = "none"; startGame(); }

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    player.r = Math.min(canvas.width, canvas.height) * 0.06;
    enemy.r = player.r;
});

checkAutoLogin();
initOnline();
window.dispatchEvent(new Event('resize'));
window.addEventListener("mousemove", (e) => { player.x = e.clientX; player.y = e.clientY; });
window.addEventListener("touchmove", (e) => { player.x = e.touches[0].clientX; player.y = e.touches[0].clientY; e.preventDefault(); }, {passive:false});
</script>
