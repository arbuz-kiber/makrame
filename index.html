<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Побег от Наталии</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #ffffff; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #score { position: fixed; top: 10px; left: 10px; font-size: 24px; font-weight: bold; z-index: 2; pointer-events: none; }
        
        .online-badge { 
            background: #eef2ff; color: #4f46e5; padding: 5px 15px; border-radius: 20px; 
            font-size: 14px; font-weight: bold; margin-bottom: 10px; border: 1px solid #e0e7ff;
        }

        #slowStatus { 
            position: fixed; top: 10px; right: 10px; font-size: 20px; font-weight: bold; 
            color: #3b82f6; display: none; z-index: 2; background: rgba(255,255,255,0.7);
            padding: 5px 10px; border-radius: 8px;
        }

        #freezeOverlay {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            font-size: 150px; pointer-events: none; z-index: 5; opacity: 0;
            transition: transform 0.5s ease-out, opacity 0.5s ease-out;
        }

        .overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 12px; z-index: 10; padding: 20px; text-align: center; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; background: #007bff; color: white; border-radius: 10px; width: 260px; transition: 0.2s; font-weight: bold; }
        button:active { transform: scale(0.95); }
        input { padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 10px; width: 240px; outline: none; }
        
        .auth-box { display: flex; flex-direction: column; gap: 10px; }

        .leaderboard-table { width: 100%; max-width: 300px; border-collapse: collapse; margin-top: 5px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 14px; }
        .leaderboard-table th { background: #6c757d; color: white; padding: 8px; }
        .leaderboard-table td { padding: 6px; border-bottom: 1px solid #eee; }
        .scroll-area { max-height: 220px; overflow-y: auto; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; }

        .tg-button { background: #24A1DE !important; margin-top: 5px; }
    </style>
</head>
<body>

<div id="score">Очки: 0</div>
<div id="slowStatus">❄️ <span id="slowFrames">0</span></div>
<div id="freezeOverlay">🥶</div>

<div id="menu" class="overlay">
    <div id="onlineCount" class="online-badge">Онлайн: ...</div>
    <h1 style="margin: 0;">Побег от Наталии 😈</h1>
    
    <div id="authSection" class="auth-box">
        <input id="loginName" type="text" placeholder="Ваш Ник" maxlength="15">
        <input id="loginPass" type="password" placeholder="Пароль">
        <p id="authError" style="color: red; font-size: 11px; margin: 0; display: none;"></p>
        <button onclick="handleAuth()">Войти / Создать</button>
    </div>

    <div id="gameSection" style="display: none;">
        <h2 id="welcomeText" style="margin: 5px 0;"></h2>
        <button onclick="startGame()" style="background: #28a745;">ИГРАТЬ</button>
        <button onclick="showLeaderboard()" style="background: #6c757d; margin-top: 8px;">🏆 Лидеры</button>
        <button onclick="location.reload()" style="background: none; color: #999; text-decoration: underline; font-size: 12px; margin-top: 10px; width: auto;">Сменить аккаунт</button>
    </div>

    <a href="https://t.me/+godxyKIhKEs3Zjhi" target="_blank" style="text-decoration: none;">
        <button class="tg-button">📢 Наш Telegram</button>
    </a>
</div>

<div id="leaderboard" class="overlay" style="display: none;">
    <h2>🏆 ТАБЛИЦА ЛИДЕРОВ</h2>
    <div class="scroll-area">
        <table class="leaderboard-table">
            <thead><tr><th colspan="3">РЕКОРДЫ</th></tr></thead>
            <tbody id="bestBody"></tbody>
        </table>
        <table class="leaderboard-table">
            <thead><tr><th colspan="3">ВСЕГО ОЧКОВ</th></tr></thead>
            <tbody id="totalBody"></tbody>
        </table>
    </div>
    <button onclick="closeLeaderboard()" style="background:#6c757d; margin-top: 10px;">Назад</button>
</div>

<div id="gameOver" class="overlay" style="display: none;">
    <h1>Тебя поймали! 😈</h1>
    <p id="finalScore" style="font-size: 24px; font-weight: bold;"></p>
    <button onclick="restart()">Играть снова</button>
    <button onclick="backToMenu()" style="background:#6c757d">В меню</button>
</div>

<canvas id="game"></canvas>

<script>
const SB_URL = "https://ffmyynrwbggefxqtkpau.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmbXl5bnJ3YmdnZWZ4cXRrcGF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTU2NDksImV4cCI6MjA5MTQzMTY0OX0.Pb3KJl6edAA_k5Ce6JlWO0Y81T-XboLVcPlvdU-T3W0";
const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
const sessionID = Math.random().toString(36).substring(7);

let playerName = "";
let currentID = null;

// --- ОНЛАЙН ---
async function initOnline() {
    const channel = supabaseClient.channel('presence-game', { config: { presence: { key: sessionID } } });
    channel.on('presence', { event: 'sync' }, () => {
        const count = Object.keys(channel.presenceState()).length;
        document.getElementById("onlineCount").innerText = "Онлайн: " + count;
    }).subscribe(async (status) => {
        if (status === 'SUBSCRIBED') await channel.track({ user: playerName || 'Гость' });
    });
}
initOnline();

// --- АНИМАЦИЯ ---
function triggerFreeze() {
    const el = document.getElementById("freezeOverlay");
    el.style.transition = "none"; el.style.transform = "scale(0.5)"; el.style.opacity = "1";
    setTimeout(() => {
        el.style.transition = "transform 0.5s ease-out, opacity 0.5s ease-out";
        el.style.transform = "scale(1.5)"; el.style.opacity = "0";
    }, 50);
}

// --- АВТОРИЗАЦИЯ ---
async function handleAuth() {
    const name = document.getElementById("loginName").value.trim();
    const pass = document.getElementById("loginPass").value.trim();
    const err = document.getElementById("authError");

    if (name.length < 2 || pass.length < 4) {
        err.innerText = "Ник (2+) и пароль (4+) слишком короткие";
        err.style.display = "block"; return;
    }

    const { data: user } = await supabaseClient.from('leaderboard').select('*').eq('name', name).maybeSingle();

    if (user) {
        if (user.password === pass) { loginSuccess(user); } 
        else { err.innerText = "Неверный пароль для этого ника"; err.style.display = "block"; }
    } else {
        const { data: newUser, error: regErr } = await supabaseClient.from('leaderboard').insert([{ name, password: pass, score: 0, total_score: 0 }]).select().single();
        if (regErr) { err.innerText = "Ошибка регистрации"; err.style.display = "block"; } 
        else { loginSuccess(newUser); }
    }
}

function loginSuccess(user) {
    playerName = user.name; currentID = user.id;
    document.getElementById("authSection").style.display = "none";
    document.getElementById("gameSection").style.display = "block";
    document.getElementById("welcomeText").innerText = "Привет, " + playerName + "!";
}

// --- ИГРА ---
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let score = 0, running = false, animationId, slowTimer = 0;
let player = { x: 0, y: 0, r: 25 }, enemy = { x: -200, y: -200, r: 25 }; // РАЗМЕР ОДИНАКОВЫЙ
let points = [];

const playerImg = new Image(); playerImg.src = "https://cdn-icons-png.flaticon.com/512/1946/1946429.png";
const enemyImg = new Image(); enemyImg.src = "natalia.jpg";

function spawnPoint() {
    const r = Math.random();
    let type = "common";
    if (r > 0.98) type = "rainbow"; else if (r > 0.94) type = "green"; 
    else if (r > 0.88) type = "yellow"; else if (r > 0.80) type = "epic"; else if (r > 0.70) type = "rare";

    points.push({
        x: Math.random() * (canvas.width - 50) + 25,
        y: Math.random() * (canvas.height - 50) + 25,
        r: canvas.width * 0.025, type
    });
}

function update() {
    if (!running) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let speed = (slowTimer > 0) ? 1.5 : (2 + score * 0.1);
    if (slowTimer > 0) {
        slowTimer--;
        document.getElementById("slowStatus").style.display = "block";
        document.getElementById("slowFrames").innerText = slowTimer;
    } else { document.getElementById("slowStatus").style.display = "none"; }

    let dx = player.x - enemy.x, dy = player.y - enemy.y, dist = Math.hypot(dx, dy);
    if (dist > 1) { enemy.x += (dx / dist) * speed; enemy.y += (dy / dist) * speed; }

    points.forEach((p, i) => {
        ctx.beginPath();
        ctx.fillStyle = {common:"#8B4513", rare:"#3b82f6", yellow:"#FFD700", epic:"#a855f7", green:"#10b981", rainbow:"gold"}[p.type];
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();

        if (Math.hypot(player.x - p.x, player.y - p.y) < player.r + p.r) {
            if (p.type === "rare") { slowTimer += 40; triggerFreeze(); }
            if (p.type === "yellow") { slowTimer += 100; triggerFreeze(); }
            score += {common:1, rare:1, yellow:1, epic:3, green:5, rainbow:10}[p.type];
            document.getElementById("score").innerText = "Очки: " + score;
            points.splice(i, 1); spawnPoint();
        }
    });

    ctx.drawImage(playerImg, player.x - player.r, player.y - player.r, player.r*2, player.r*2);
    ctx.save(); ctx.beginPath(); ctx.arc(enemy.x, enemy.y, enemy.r, 0, Math.PI*2); ctx.clip();
    ctx.drawImage(enemyImg, enemy.x - enemy.r, enemy.y - enemy.r, enemy.r*2, enemy.r*2); ctx.restore();

    if (dist < player.r + enemy.r * 0.85) gameOver();
    else animationId = requestAnimationFrame(update);
}

// --- СТАТИСТИКА ---
async function showLeaderboard() {
    document.getElementById("leaderboard").style.display = "flex";
    document.getElementById("menu").style.display = "none";
    
    const { data: best } = await supabaseClient.from("leaderboard").select("name, score").order("score", { ascending: false }).limit(5);
    const { data: total } = await supabaseClient.from("leaderboard").select("name, total_score").order("total_score", { ascending: false }).limit(5);

    document.getElementById("bestBody").innerHTML = best?.map((p, i) => `<tr><td>${i+1}</td><td>${p.name}</td><td>${p.score}</td></tr>`).join("") || "";
    document.getElementById("totalBody").innerHTML = total?.map((p, i) => `<tr><td>${i+1}</td><td>${p.name}</td><td>${p.total_score}</td></tr>`).join("") || "";
}

async function saveResults(s) {
    if (!currentID) return;
    const { data } = await supabaseClient.from("leaderboard").select("*").eq("id", currentID).single();
    if (data) {
        await supabaseClient.from("leaderboard").update({
            score: Math.max(s, data.score),
            total_score: (data.total_score || 0) + s
        }).eq("id", currentID);
    }
}

function startGame() {
    document.getElementById("menu").style.display = "none";
    score = 0; points = []; slowTimer = 0; enemy.x = -200;
    document.getElementById("score").innerText = "Очки: 0";
    for(let i=0; i<6; i++) spawnPoint();
    running = true; update();
}

function gameOver() {
    running = false; saveResults(score);
    document.getElementById("finalScore").innerText = "Счёт: " + score;
    document.getElementById("gameOver").style.display = "flex";
}

function closeLeaderboard() { document.getElementById("leaderboard").style.display = "none"; document.getElementById("menu").style.display = "flex"; }
function backToMenu() { document.getElementById("gameOver").style.display = "none"; document.getElementById("menu").style.display = "flex"; }
function restart() { document.getElementById("gameOver").style.display = "none"; startGame(); }

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    player.r = Math.min(canvas.width, canvas.height) * 0.06;
    enemy.r = player.r; // На Наталия такого же размера
});
window.dispatchEvent(new Event('resize'));
window.addEventListener("mousemove", (e) => { player.x = e.clientX; player.y = e.clientY; });
window.addEventListener("touchmove", (e) => { player.x = e.touches[0].clientX; player.y = e.touches[0].clientY; e.preventDefault(); }, {passive:false});
</script>
</body>
</html>
