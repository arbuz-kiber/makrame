<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Побег от Наталии</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-glass: rgba(255, 255, 255, 0.9);
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background: #f3f4f6; 
            font-family: 'Inter', -apple-system, sans-serif; 
            touch-action: none; 
        }

        canvas { display: block; }

        /* Игровые индикаторы */
        #score { 
            position: fixed; top: 20px; left: 20px; 
            font-size: 22px; font-weight: 800; z-index: 2; 
            color: var(--text-main); background: var(--bg-glass);
            padding: 8px 16px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        #slowStatus { 
            position: fixed; top: 20px; right: 20px; 
            font-size: 18px; font-weight: bold; color: #2563eb; 
            display: none; z-index: 2; background: var(--bg-glass);
            padding: 8px 16px; border-radius: 12px; border: 2px solid #bfdbfe;
        }

        #freezeOverlay {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            font-size: 120px; pointer-events: none; z-index: 5; opacity: 0;
        }

        /* Общие стили оверлеев */
        .overlay { 
            position: fixed; inset: 0; 
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; gap: 20px; z-index: 10; padding: 24px; 
            transition: all 0.3s ease;
        }

        /* Карточка меню */
        .menu-card {
            background: var(--bg-glass);
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 340px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
        }

        h1 { font-size: 28px; margin: 0 0 10px 0; color: var(--text-main); letter-spacing: -0.5px; }

        /* Стили кнопок */
        button { 
            width: 100%;
            padding: 14px 20px; 
            font-size: 16px; font-weight: 700;
            cursor: pointer; border: none; 
            background: #374151; color: white; 
            border-radius: 14px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        button:active { transform: scale(0.98); }

        .btn-play { background: #10b981; margin-bottom: 8px; }
        .btn-play:hover { background: #059669; }

        .btn-tg { background: #0088cc !important; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Поля ввода */
        input { 
            width: 100%; box-sizing: border-box;
            padding: 14px; font-size: 16px; 
            border: 2px solid #e5e7eb; border-radius: 14px; 
            outline: none; transition: border-color 0.2s;
            background: rgba(255,255,255,0.8);
            margin-bottom: 12px;
        }
        input:focus { border-color: var(--primary); }

        /* Таблица лидеров */
        .table-container { 
            width: 100%; background: white; border-radius: 16px; 
            overflow: hidden; border: 1px solid #e5e7eb;
        }
        .leaderboard-table { width: 100%; border-collapse: collapse; }
        .leaderboard-table thead { background: #f9fafb; color: var(--text-muted); font-size: 12px; text-transform: uppercase; }
        .leaderboard-table th { padding: 12px; text-align: left; }
        .leaderboard-table td { padding: 14px 12px; border-top: 1px solid #f3f4f6; font-size: 15px; }

        .online-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: #dcfce7; color: #166534; padding: 4px 12px;
            border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 15px;
        }
        .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="score">Очки: 0</div>
<div id="slowStatus">❄️ <span id="slowFrames">0</span></div>
<div id="freezeOverlay">🥶</div>

<div id="menu" class="overlay">
    <div class="menu-card">
        <div class="online-badge">
            <span class="online-dot"></span>
            Онлайн: <span id="onlineCount">...</span>
        </div>
        <h1>Побег от Наталии 😈</h1>
        
        <div id="authSection" class="auth-box">
            <input id="loginName" type="text" placeholder="Придумайте ник" maxlength="15">
            <input id="loginPass" type="password" placeholder="Пароль">
            <p id="authError" style="color: #ef4444; font-size: 12px; margin: -5px 0 10px 0; display: none;"></p>
            <button onclick="handleAuth()">Войти / Регистрация</button>
        </div>

        <div id="gameSection" style="display: none;">
            <p style="margin: 0 0 15px 0; color: var(--text-muted)">Добро пожаловать, <b id="welcomeText" style="color: var(--text-main)"></b>!</p>
            <button onclick="startGame()" class="btn-play">НАЧАТЬ ИГРУ</button>
            <button onclick="showLeaderboard()" style="background: #6b7280;">🏆 Таблица лидеров</button>
            <button onclick="location.reload()" style="background: transparent; color: #9ca3af; box-shadow: none; font-size: 13px; text-decoration: underline;">Сменить аккаунт</button>
        </div>
    </div>
    
    <a href="https://t.me/+godxyKIhKEs3Zjhi" target="_blank" style="text-decoration: none; width: 100%; max-width: 340px;">
        <button class="btn-tg">📢 Наш Telegram</button>
    </a>
</div>

<div id="leaderboard" class="overlay" style="display: none;">
    <div class="menu-card" style="max-width: 400px;">
        <h2 style="margin-top: 0;">🏆 Топ игроков</h2>
        
        <div class="filters-container" style="display: flex; gap: 8px; margin-bottom: 15px;">
            <button id="btnRec" onclick="loadTab('score')" style="font-size: 12px; padding: 8px;">ПО РЕКОРДУ</button>
            <button id="btnSum" onclick="loadTab('total_score')" style="font-size: 12px; padding: 8px; background: #e5e7eb; color: #374151;">ПО СУММЕ</button>
        </div>

        <div class="table-container">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th style="width: 40px;">#</th>
                        <th>Игрок</th>
                        <th id="typeLabel" style="text-align: right;">Очки</th>
                    </tr>
                </thead>
                <tbody id="leaderBody"></tbody>
            </table>
        </div>
        
        <button onclick="closeLeaderboard()" style="margin-top: 20px;">Назад в меню</button>
    </div>
</div>

<div id="gameOver" class="overlay" style="display: none;">
    <div class="menu-card">
        <h1 style="font-size: 40px;">😈</h1>
        <h2 style="margin: 0;">Пойман!</h2>
        <p style="font-size: 20px; color: var(--text-muted); margin: 10px 0 25px 0;">Ваш результат: <b id="finalScore" style="color: var(--primary)">0</b></p>
        
        <button onclick="restart()" class="btn-play">ПОПРОБОВАТЬ СНОВА</button>
        <button onclick="backToMenu()" style="margin-top: 8px; background: #6b7280;">В МЕНЮ</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
// --- КОНФИГ И ЛОГИКА ОСТАЛИСЬ ПРЕЖНИМИ (РАБОЧИМИ) ---
const SB_URL = "https://ffmyynrwbggefxqtkpau.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmbXl5bnJ3YmdnZWZ4cXRrcGF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTU2NDksImV4cCI6MjA5MTQzMTY0OX0.Pb3KJl6edAA_k5Ce6JlWO0Y81T-XboLVcPlvdU-T3W0";
const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
const sessionID = Math.random().toString(36).substring(7);

let playerName = "";
let currentID = null;

async function initOnline() {
    const channel = supabaseClient.channel('presence-game', { config: { presence: { key: sessionID } } });
    channel.on('presence', { event: 'sync' }, () => {
        const count = Object.keys(channel.presenceState()).length;
        document.getElementById("onlineCount").innerText = count;
    }).subscribe(async (status) => {
        if (status === 'SUBSCRIBED') await channel.track({ user: playerName || 'Гость' });
    });
}
initOnline();

function triggerFreeze() {
    const el = document.getElementById("freezeOverlay");
    el.style.transition = "none"; el.style.transform = "scale(0.5)"; el.style.opacity = "1";
    setTimeout(() => {
        el.style.transition = "transform 0.5s ease-out, opacity 0.5s ease-out";
        el.style.transform = "scale(1.5)"; el.style.opacity = "0";
    }, 50);
}

async function handleAuth() {
    const name = document.getElementById("loginName").value.trim();
    const pass = document.getElementById("loginPass").value.trim();
    const err = document.getElementById("authError");
    if (name.length < 2 || pass.length < 4) { err.innerText = "Ник (2+) и пароль (4+) слишком короткие"; err.style.display = "block"; return; }
    
    const { data: user } = await supabaseClient.from('leaderboard').select('*').eq('name', name).maybeSingle();
    
    if (user) {
        if (user.password === pass) { loginSuccess(user); } 
        else { err.innerText = "Неверный пароль"; err.style.display = "block"; }
    } else {
        const { data: newUser, error: regErr } = await supabaseClient.from('leaderboard').insert([{ name, password: pass, score: 0, total_score: 0 }]).select().single();
        if (regErr) { err.innerText = "Ошибка регистрации"; err.style.display = "block"; } else { loginSuccess(newUser); }
    }
}

function loginSuccess(user) {
    playerName = user.name; currentID = user.id;
    document.getElementById("authSection").style.display = "none";
    document.getElementById("gameSection").style.display = "block";
    document.getElementById("welcomeText").innerText = playerName;
}

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let score = 0, running = false, animationId, slowTimer = 0;
let player = { x: 0, y: 0, r: 25 }, enemy = { x: -200, y: -200, r: 25 };
let points = [];
const playerImg = new Image(); playerImg.src = "https://cdn-icons-png.flaticon.com/512/1946/1946429.png";
const enemyImg = new Image(); enemyImg.src = "natalia.jpg";

function spawnPoint() {
    const r = Math.random();
    let type = "common";
    if (r > 0.98) type = "rainbow"; else if (r > 0.94) type = "green"; 
    else if (r > 0.88) type = "yellow"; else if (r > 0.80) type = "epic"; else if (r > 0.70) type = "rare";
    points.push({ x: Math.random() * (canvas.width - 50) + 25, y: Math.random() * (canvas.height - 50) + 25, r: canvas.width * 0.025, type });
}

function update() {
    if (!running) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let speed = (slowTimer > 0) ? 1.5 : (2 + score * 0.1);
    if (slowTimer > 0) {
        slowTimer--;
        document.getElementById("slowStatus").style.display = "block";
        document.getElementById("slowFrames").innerText = slowTimer;
    } else { document.getElementById("slowStatus").style.display = "none"; }
    let dx = player.x - enemy.x, dy = player.y - enemy.y, dist = Math.hypot(dx, dy);
    if (dist > 1) { enemy.x += (dx / dist) * speed; enemy.y += (dy / dist) * speed; }
    points.forEach((p, i) => {
        ctx.beginPath();
        ctx.fillStyle = {common:"#8B4513", rare:"#3b82f6", yellow:"#FFD700", epic:"#a855f7", green:"#10b981", rainbow:"gold"}[p.type];
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        if (Math.hypot(player.x - p.x, player.y - p.y) < player.r + p.r) {
            if (p.type === "rare") { slowTimer += 40; triggerFreeze(); }
            if (p.type === "yellow") { slowTimer += 100; triggerFreeze(); }
            score += {common:1, rare:1, yellow:1, epic:3, green:5, rainbow:10}[p.type];
            document.getElementById("score").innerText = "Очки: " + score;
            points.splice(i, 1); spawnPoint();
        }
    });
    ctx.drawImage(playerImg, player.x - player.r, player.y - player.r, player.r*2, player.r*2);
    ctx.save(); ctx.beginPath(); ctx.arc(enemy.x, enemy.y, enemy.r, 0, Math.PI*2); ctx.clip();
    ctx.drawImage(enemyImg, enemy.x - enemy.r, enemy.y - enemy.r, enemy.r*2, enemy.r*2); ctx.restore();
    if (dist < player.r + enemy.r * 0.85) gameOver();
    else animationId = requestAnimationFrame(update);
}

async function showLeaderboard() {
    document.getElementById("leaderboard").style.display = "flex";
    document.getElementById("menu").style.display = "none";
    loadTab('score');
}

async function loadTab(mode) {
    const btnRec = document.getElementById("btnRec");
    const btnSum = document.getElementById("btnSum");
    
    if(mode === 'score') {
        btnRec.style.background = "#374151"; btnRec.style.color = "white";
        btnSum.style.background = "#e5e7eb"; btnSum.style.color = "#374151";
        document.getElementById("typeLabel").innerText = "Рекорд";
    } else {
        btnSum.style.background = "#374151"; btnSum.style.color = "white";
        btnRec.style.background = "#e5e7eb"; btnRec.style.color = "#374151";
        document.getElementById("typeLabel").innerText = "Сумма";
    }
    
    const { data } = await supabaseClient.from("leaderboard").select("name, score, total_score").order(mode, { ascending: false }).limit(10);
    document.getElementById("leaderBody").innerHTML = data?.map((p, i) => `
        <tr>
            <td style="color: #9ca3af; font-weight: bold;">${i+1}</td>
            <td style="font-weight: 600;">${p.name}</td>
            <td style="text-align: right; font-weight: 800; color: var(--primary);">${mode === 'score' ? p.score : p.total_score}</td>
        </tr>
    `).join("") || "<tr><td colspan='3'>Загрузка...</td></tr>";
}

async function saveResults(s) {
    if (!currentID) return;
    const { data } = await supabaseClient.from("leaderboard").select("*").eq("id", currentID).single();
    if (data) {
        await supabaseClient.from("leaderboard").update({ score: Math.max(s, data.score), total_score: (data.total_score || 0) + s }).eq("id", currentID);
    }
}

function startGame() {
    document.getElementById("menu").style.display = "none";
    score = 0; points = []; slowTimer = 0; enemy.x = -200;
    document.getElementById("score").innerText = "Очки: 0";
    for(let i=0; i<6; i++) spawnPoint();
    running = true; update();
}

function gameOver() { 
    running = false; 
    saveResults(score); 
    document.getElementById("finalScore").innerText = score; 
    document.getElementById("gameOver").style.display = "flex"; 
}

function closeLeaderboard() { document.getElementById("leaderboard").style.display = "none"; document.getElementById("menu").style.display = "flex"; }
function backToMenu() { document.getElementById("gameOver").style.display = "none"; document.getElementById("menu").style.display = "flex"; }
function restart() { document.getElementById("gameOver").style.display = "none"; startGame(); }

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    player.r = Math.min(canvas.width, canvas.height) * 0.06;
    enemy.r = player.r;
});
window.dispatchEvent(new Event('resize'));
window.addEventListener("mousemove", (e) => { player.x = e.clientX; player.y = e.clientY; });
window.addEventListener("touchmove", (e) => { player.x = e.touches[0].clientX; player.y = e.touches[0].clientY; e.preventDefault(); }, {passive:false});
</script>
</body>
</html>
