<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Побег от Наталии</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --bg-glass: rgba(255, 255, 255, 0.92);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --radius: 20px;
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background: var(--bg-dark); 
            font-family: 'Inter', -apple-system, sans-serif; 
            /* Разрешаем скролл по умолчанию, блокируем скриптом при игре */
            touch-action: pan-x pan-y; 
            color: var(--text-main);
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        canvas { display: block; }

        #score { 
            position: fixed; top: 20px; left: 20px; 
            font-size: 18px; font-weight: 800; z-index: 2; 
            color: var(--text-main); background: var(--bg-glass);
            padding: 8px 16px; border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        #slowStatus { 
            position: fixed; top: 20px; right: 20px; 
            font-size: 16px; font-weight: bold; color: #3b82f6; 
            display: none; z-index: 2; background: var(--bg-glass);
            padding: 8px 16px; border-radius: 12px; border: 1px solid #bfdbfe;
            backdrop-filter: blur(8px);
        }

        #freezeOverlay {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            font-size: 100px; pointer-events: none; z-index: 5; opacity: 0;
        }

        .overlay { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; gap: 15px; z-index: 10; padding: 16px; 
            animation: fadeIn 0.4s ease-out;
            overflow-y: auto;
            touch-action: pan-y;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .menu-card {
            background: var(--bg-glass);
            padding: 25px 20px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 350px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.6);
            text-align: center;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto; 
            touch-action: pan-y; 
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 480px) {
            .menu-card { padding: 20px 15px; margin: auto; }
            h1 { font-size: 26px !important; }
            button { padding: 14px 18px !important; font-size: 15px !important; }
            #score { top: 10px; left: 10px; font-size: 16px; }
            #slowStatus { top: 10px; right: 10px; font-size: 14px; }
        }

        h1 { 
            font-size: 32px; 
            margin: 0 0 10px 0; 
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: -1px;
        }

        button { 
            width: 100%;
            padding: 16px 20px; 
            font-size: 16px; font-weight: 700;
            cursor: pointer; border: none; 
            background: var(--primary); color: white; 
            border-radius: 16px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 0px var(--primary-dark);
            margin-top: 8px;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        button:active { transform: translateY(2px); box-shadow: 0 0px 0px var(--primary-dark); }
        button:disabled { background: #cbd5e1; box-shadow: none; transform: none; cursor: not-allowed; }

        .btn-play { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); 
            box-shadow: 0 4px 0px #047857;
            font-size: 18px;
        }

        .btn-tg { background: #0088cc !important; box-shadow: 0 4px 0px #006699 !important; }

        input { 
            width: 100%; box-sizing: border-box;
            padding: 14px; font-size: 16px; 
            border: 2px solid #e2e8f0; border-radius: 16px; 
            outline: none; transition: all 0.2s;
            background: rgba(255,255,255,0.7);
            margin-bottom: 10px;
            color: var(--text-main);
        }
        input:focus { border-color: var(--primary); background: #fff; }

        .tabs-container { 
            display: flex; 
            background: #f1f5f9;
            padding: 4px;
            border-radius: 14px;
            gap: 4px; 
            margin-bottom: 15px; 
            flex-shrink: 0;
            position: sticky; top: 0; z-index: 5;
        }
        .tab-btn { 
            flex: 1; 
            padding: 8px; 
            font-size: 12px; 
            background: transparent; 
            color: var(--text-muted); 
            border-radius: 10px; 
            margin: 0; 
            box-shadow: none !important;
            transform: none !important;
        }
        .tab-btn.active { background: white; color: var(--primary); font-weight: 800; }

        .table-container { 
            width: 100%; 
            background: #fff; 
            border-radius: 16px; 
            border: 1px solid #e2e8f0;
            margin-bottom: 10px;
            overflow-y: auto; 
            max-height: 300px; 
            touch-action: pan-y;
            -webkit-overflow-scrolling: touch;
        }
        
        .leaderboard-table { width: 100%; border-collapse: collapse; }
        .leaderboard-table th { position: sticky; top: 0; z-index: 2; padding: 10px; background: #f8fafc; font-size: 10px; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid #e2e8f0; }
        .leaderboard-table td { padding: 12px 10px; border-top: 1px solid #f1f5f9; font-size: 13px; }

        #shopList, #radioList { flex: 1; overflow-y: auto; padding: 2px; touch-action: pan-y; -webkit-overflow-scrolling: touch; }
        .shop-item, .radio-item {
            display: flex; align-items: center; gap: 10px;
            background: white; padding: 10px; border-radius: 16px;
            margin-bottom: 8px; border: 1px solid #e2e8f0;
        }
        .shop-img { width: 45px; height: 45px; border-radius: 12px; object-fit: cover; }
        .shop-info { flex: 1; text-align: left; }
        .shop-name { font-weight: 800; font-size: 13px; }
        .shop-price { font-size: 11px; color: #d97706; font-weight: 700; }
        .btn-buy-small { width: auto; padding: 8px 12px; font-size: 11px; margin: 0; }

        .status-container { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-bottom: 15px; }
        .macrame-badge {
            background: #fffbeb; color: #92400e; padding: 5px 14px;
            border-radius: 50px; font-size: 15px; font-weight: 800;
            border: 2px solid #fef3c7; display: flex; align-items: center; gap: 5px;
        }
        .online-badge {
            background: #f0fdf4; color: #166534; padding: 3px 10px;
            border-radius: 50px; font-size: 11px; font-weight: 600;
            border: 1px solid #dcfce7; display: flex; align-items: center; gap: 4px;
        }
        .online-dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div id="score">Очки: 0</div>
<div id="slowStatus">❄️ <span id="slowFrames">0</span></div>
<div id="freezeOverlay">🥶</div>

<div id="menu" class="overlay">
    <div class="menu-card">
        <div class="status-container">
            <div id="macrameStats" class="macrame-badge" style="display: none;">
                <span id="boostIcon" style="display:none">🔥</span>
                🧶 <span id="macrameCount">0</span>
            </div>
            <div id="activeBoostTimer" style="display:none; color:#ef4444; font-size:11px; font-weight:800;">x2🧶: <span id="bTime">0:00</span></div>
            <div class="online-badge">
                <span class="online-dot"></span>
                <span id="onlineCount">...</span> онлайн
            </div>
        </div>
        
        <h1 id="mainTitle">Наталия 😈</h1>
        
        <div id="authSection">
            <input id="loginName" type="text" placeholder="Ваш ник" maxlength="15">
            <input id="loginPass" type="password" placeholder="Пароль">
            <p id="authError" style="color: #ef4444; font-size: 11px; margin: -5px 0 10px 0; display: none;"></p>
            <button onclick="handleAuth()">Войти</button>
        </div>

        <div id="gameSection" style="display: none;">
            <p style="margin: 0 0 10px 0; color: var(--text-muted); font-size: 14px;">Готов, <b id="welcomeText" style="color: var(--primary)"></b>?</p>
            <button onclick="startGame()" class="btn-play">🚀 ИГРАТЬ</button>
            <button onclick="openShop()">🛒 Магазин</button>
            <button onclick="showLeaderboard()">🏆 Лидеры</button>
            <button onclick="openRadio()">📻 Радио</button>
            <button onclick="logout()" style="background: transparent; color: #94a3b8; box-shadow: none; font-size: 12px; text-decoration: underline; margin-top:5px;">Выйти</button>
        </div>
    </div>
    
    <a href="https://t.me/+godxyKIhKEs3Zjhi" target="_blank" style="text-decoration: none; width: 100%; max-width: 350px;">
        <button class="btn-tg">📢 Telegram</button>
    </a>
</div>

<div id="shop" class="overlay" style="display: none;">
    <div class="menu-card">
        <h2 style="margin:0 0 10px 0; font-size: 20px;">Магазин</h2>
        <div class="tabs-container">
            <button id="tabSkins" class="tab-btn active" onclick="renderShop('skins')">Скины</button>
            <button id="tabBoosts" class="tab-btn" onclick="renderShop('boosts')">Бустеры</button>
        </div>
        <div id="shopList"></div>
        <button onclick="closeOverlay('shop')" style="background:#64748b; box-shadow: 0 4px 0px #475569; margin-top: 15px;">Назад</button>
    </div>
</div>

<div id="radio" class="overlay" style="display: none;">
    <div class="menu-card">
        <h2 style="margin:0 0 10px 0; font-size: 20px;">📻 Радио</h2>
        <div id="radioList">
            <div class="radio-item">
                <div class="shop-info">
                    <div class="shop-name">Technologia Phonk</div>
                    <div class="shop-price">phonk.mp3</div>
                </div>
                <button id="btn-song1" class="btn-buy-small radio-btn" onclick="toggleSong('phonk.mp3', 'btn-song1')">ИГРАТЬ</button>
            </div>
            <div class="radio-item">
                <div class="shop-info">
                    <div class="shop-name">Пообещай</div>
                    <div class="shop-price">elixir.mp3</div>
                </div>
                <button id="btn-song2" class="btn-buy-small radio-btn" onclick="toggleSong('elixir.mp3', 'btn-song2')">ИГРАТЬ</button>
            </div>
        </div>
        <button onclick="closeOverlay('radio')" style="background:#64748b; box-shadow: 0 4px 0px #475569; margin-top: 15px;">Назад</button>
    </div>
</div>

<div id="leaderboard" class="overlay" style="display: none;">
    <div class="menu-card">
        <h2 style="margin:0 0 10px 0; font-size: 20px;">🏆 Зал славы</h2>
        <div class="tabs-container">
            <button id="btnRec" class="tab-btn active" onclick="loadTab('score')">Рекорды</button>
            <button id="btnSum" class="tab-btn" onclick="loadTab('total_score')">Всего</button>
        </div>
        <div class="table-container">
            <table class="leaderboard-table">
                <thead>
                    <tr><th style="width:30px">#</th><th>Игрок</th><th id="typeLabel" style="text-align:right">Очки</th></tr>
                </thead>
                <tbody id="leaderBody"></tbody>
            </table>
        </div>
        <button onclick="closeOverlay('leaderboard')" style="background:#64748b; box-shadow: 0 4px 0px #475569; margin-top: 15px;">Назад</button>
    </div>
</div>

<div id="gameOver" class="overlay" style="display: none;">
    <div class="menu-card">
        <h1 id="gameOverEmoji" style="font-size: 40px; margin:0">😈</h1>
        <h2 id="gameOverTitle" style="font-size: 18px; margin-bottom:5px">Тебя поймали!</h2>
        <p style="margin:5px 0; color:var(--text-muted); font-size: 14px;">Награда🧶: <b id="addedMacrame" style="color:#10b981">+0</b> <span id="boostIndicator" style="color:#f59e0b; font-weight:800"></span></p>
        <div style="background:#f8fafc; padding:12px; border-radius:14px; margin: 10px 0;">
            <b id="finalScore" style="font-size: 28px; color: var(--primary)">0</b>
        </div>
        <button onclick="restart()" class="btn-play">🔥 ПОВТОРИТЬ</button>
        <button onclick="backToMenu()" style="background:#64748b; box-shadow: 0 4px 0px #475569;">В МЕНЮ</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const SB_URL = "https://ffmyynrwbggefxqtkpau.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZmbXl5bnJ3YmdnZWZ4cXRrcGF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTU2NDksImV4cCI6MjA5MTQzMTY0OX0.Pb3KJl6edAA_k5Ce6JlWO0Y81T-XboLVcPlvdU-T3W0";
const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
const sessionID = Math.random().toString(36).substring(7);

let playerName = "", currentID = null, totalMacrame = 0, ownedSkins = ["natalia"], currentSkin = "natalia", boostersCount = 0, boostUntil = null; 
let currentAudio = null;

const SKINS = {
    "natalia": { name: "Наталия", img: "natalia.jpg", price: 0, title: "Побег от Наталии", emoji: "😈" },
    "dmitro": { name: "Дмитро", img: "дмитро.jpg", price: 1500, title: "Побег от Дмитра", emoji: "🥸", refund: 800 },
    "budko": { name: "Будко", img: "будко.png", price: 5000, title: "Побег от Оксаны", emoji: "👺", refund: 2500 }
};

function isBoostActive() { return boostUntil && new Date(boostUntil) > new Date(); }

async function buyBooster() {
    if (totalMacrame >= 1250) {
        totalMacrame -= 1250; boostersCount++;
        const { error } = await supabaseClient.from('leaderboard').update({ macrame_points: totalMacrame, boosters_count: boostersCount }).eq('id', currentID);
        if(!error) { updateMacrameUI(); renderShop('boosts'); }
    } else { alert("Недостаточно макраме!"); }
}

async function activateBooster() {
    if (boostersCount <= 0) return;
    let now = new Date(), baseTime = isBoostActive() ? new Date(boostUntil) : now;
    let newEnd = new Date(baseTime.getTime() + (7 * 60 * 1000));
    boostersCount--; boostUntil = newEnd.toISOString();
    const { error } = await supabaseClient.from('leaderboard').update({ boosters_count: boostersCount, boost_until: boostUntil }).eq('id', currentID);
    if(!error) { updateMacrameUI(); renderShop('boosts'); }
}

setInterval(() => {
    const timerBox = document.getElementById("activeBoostTimer"), timeLabel = document.getElementById("bTime"), icon = document.getElementById("boostIcon");
    if (isBoostActive()) {
        const diff = new Date(boostUntil) - new Date();
        const mins = Math.floor(diff / 60000), secs = Math.floor((diff % 60000) / 1000);
        timerBox.style.display = "block"; icon.style.display = "inline";
        timeLabel.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    } else { timerBox.style.display = "none"; icon.style.display = "none"; }
}, 1000);

async function checkAutoLogin() {
    const saved = localStorage.getItem('game_user');
    if (saved) {
        const localData = JSON.parse(saved);
        const { data: user } = await supabaseClient.from('leaderboard').select('*').eq('id', localData.id).maybeSingle();
        if (user) loginSuccess(user, true);
    }
}

async function handleAuth() {
    const name = document.getElementById("loginName").value.trim(), pass = document.getElementById("loginPass").value.trim(), err = document.getElementById("authError");
    if (name.length < 2 || pass.length < 4) { err.innerText = "Ник (2+) и пароль (4+) малы"; err.style.display = "block"; return; }
    const { data: user } = await supabaseClient.from('leaderboard').select('*').eq('name', name).maybeSingle();
    if (user) {
        if (user.password === pass) { loginSuccess(user); } 
        else { err.innerText = "Неверный пароль"; err.style.display = "block"; }
    } else {
        const { data: newUser } = await supabaseClient.from('leaderboard').insert([{ name, password: pass, score: 0, total_score: 0, macrame_points: 0, owned_skins: ["natalia"], current_skin: "natalia", boosters_count: 0 }]).select().single();
        loginSuccess(newUser);
    }
}

function loginSuccess(user, save = true) {
    playerName = user.name; currentID = user.id; totalMacrame = user.macrame_points || 0; 
    ownedSkins = user.owned_skins || ["natalia"]; currentSkin = user.current_skin || "natalia";
    boostersCount = user.boosters_count || 0; boostUntil = user.boost_until;
    if (save) localStorage.setItem('game_user', JSON.stringify(user));
    document.getElementById("authSection").style.display = "none";
    document.getElementById("gameSection").style.display = "block";
    document.getElementById("welcomeText").innerText = playerName;
    updateMacrameUI(); applySkin();
}

async function saveResults(s) {
    if (!currentID) return;
    const isBoosted = isBoostActive(), multiplier = isBoosted ? 2 : 1, addedPoints = s * multiplier;
    const { data } = await supabaseClient.from("leaderboard").select("*").eq("id", currentID).single();
    if (data) {
        const newMacrameTotal = (data.macrame_points || 0) + addedPoints;
        const newTotalScore = (data.total_score || 0) + s;
        const newBestScore = Math.max(s, data.score || 0);
        await supabaseClient.from("leaderboard").update({ score: newBestScore, total_score: newTotalScore, macrame_points: newMacrameTotal }).eq("id", currentID);
        totalMacrame = newMacrameTotal; updateMacrameUI();
        document.getElementById("addedMacrame").innerText = "+" + addedPoints;
        document.getElementById("boostIndicator").innerText = isBoosted ? "(x2🧶)" : "";
    }
}

function updateMacrameUI() { document.getElementById("macrameStats").style.display = "flex"; document.getElementById("macrameCount").innerText = totalMacrame; }

function openShop() { document.getElementById("shop").style.display = "flex"; document.getElementById("menu").style.display = "none"; renderShop('skins'); }
function openRadio() { document.getElementById("radio").style.display = "flex"; document.getElementById("menu").style.display = "none"; }
function closeOverlay(id) { document.getElementById(id).style.display = "none"; document.getElementById("menu").style.display = "flex"; }

function toggleSong(file, btnId) {
    if (currentAudio && currentAudio.src.includes(file)) {
        if (currentAudio.paused) { currentAudio.play(); document.getElementById(btnId).innerText = "СТОП"; } 
        else { currentAudio.pause(); document.getElementById(btnId).innerText = "ИГРАТЬ"; }
    } else {
        if (currentAudio) currentAudio.pause();
        currentAudio = new Audio(file); currentAudio.loop = true; currentAudio.play();
        document.querySelectorAll('.radio-btn').forEach(b => b.innerText = "ИГРАТЬ");
        document.getElementById(btnId).innerText = "СТОП";
    }
}

let isSpinning = false;
async function spinRoulette() {
    if (isSpinning || totalMacrame < 2000) { if(!isSpinning) alert("Недостаточно макраме (2000 🧶)"); return; }
    isSpinning = true; totalMacrame -= 2000; updateMacrameUI();
    const resContainer = document.getElementById("rouletteResult"), rouletteImgs = ["дмитро.jpg", "будко.png", "natalia.jpg"];
    let i = 0;
    const anim = setInterval(() => { resContainer.innerHTML = `<img src="${rouletteImgs[i % rouletteImgs.length]}" style="width:60px;height:60px;border-radius:10px;">`; i++; }, 100);
    setTimeout(async () => {
        clearInterval(anim);
        const winId = Math.random() < 0.75 ? "dmitro" : "budko", skin = SKINS[winId];
        resContainer.innerHTML = `<img src="${skin.img}" style="width:70px;height:70px;border-radius:15px; border:3px solid #10b981; transform: scale(1.1);">`;
        let msg = "";
        if (ownedSkins.includes(winId)) { totalMacrame += skin.refund; msg = `Дубликат! Получено ${skin.refund} 🧶`; }
        else { ownedSkins.push(winId); msg = `Ура! Выпал ${skin.name}!`; }
        setTimeout(() => alert(msg), 100);
        await supabaseClient.from('leaderboard').update({ macrame_points: totalMacrame, owned_skins: ownedSkins }).eq('id', currentID);
        isSpinning = false; updateMacrameUI(); renderShop('skins');
    }, 2000);
}

function renderShop(tab) {
    const container = document.getElementById("shopList"); container.innerHTML = "";
    document.getElementById("tabSkins").className = tab === 'skins' ? 'tab-btn active' : 'tab-btn';
    document.getElementById("tabBoosts").className = tab === 'boosts' ? 'tab-btn active' : 'tab-btn';
    if (tab === 'skins') {
        container.innerHTML = `<div style="background:#fff7ed; padding:12px; border-radius:18px; border:2px dashed #fbbf24; margin-bottom:12px;"><div style="font-weight:900; color:#9a3412; font-size:11px; text-transform:uppercase; margin-bottom:8px;">🎰 СЛУЧАЙНЫЙ СКИН</div><div id="rouletteResult" style="height:70px; display:flex; align-items:center; justify-content:center;">🧶</div><button onclick="spinRoulette()" style="background:#f59e0b; box-shadow:0 4px 0px #b45309; padding:10px;" ${isSpinning ? 'disabled' : ''}>${isSpinning ? "УДАЧА..." : "КРУТИТЬ (2000🧶)"}</button></div>`;
        Object.keys(SKINS).forEach(id => {
            const s = SKINS[id], isOwned = ownedSkins.includes(id), isCurrent = currentSkin === id;
            container.innerHTML += `<div class="shop-item"><img src="${s.img}" class="shop-img"><div class="shop-info"><div class="shop-name">${s.name}</div><div class="shop-price">${isOwned ? "✅ Есть" : "💰 "+s.price}</div></div><button class="btn-buy-small" onclick="${isOwned ? `selectSkin('${id}')` : `buySkin('${id}')`}" ${isCurrent ? 'disabled' : ''}>${isCurrent ? "ВЫБРАН" : (isOwned ? "ВЗЯТЬ" : "КУПИТЬ")}</button></div>`;
        });
    } else {
        container.innerHTML = `<div class="shop-item"><div class="shop-info"><div class="shop-name">⚡️ БУСТЕР X2</div><div class="shop-price">1250 🧶 (7 МИНУТ)</div></div><button class="btn-buy-small" onclick="buyBooster()">КУПИТЬ</button></div><div style="background:#f1f5f9; padding:15px; border-radius:18px; margin-top:15px;"><div style="font-weight:800; color:#475569; font-size:13px;">ЗАПАСЫ: ${boostersCount} ШТ.</div><button onclick="activateBooster()" style="background:#10b981; box-shadow:0 4px 0px #047857;" ${boostersCount === 0 ? 'disabled' : ''}>АКТИВИРОВАТЬ</button></div>`;
    }
}

async function buySkin(id) {
    if (totalMacrame >= SKINS[id].price) {
        totalMacrame -= SKINS[id].price; ownedSkins.push(id);
        await supabaseClient.from('leaderboard').update({ macrame_points: totalMacrame, owned_skins: ownedSkins }).eq('id', currentID);
        updateMacrameUI(); renderShop('skins');
    } else { alert("Недостаточно макраме!"); }
}

async function selectSkin(id) { currentSkin = id; await supabaseClient.from('leaderboard').update({ current_skin: id }).eq('id', currentID); applySkin(); renderShop('skins'); }

function applySkin() {
    const s = SKINS[currentSkin]; enemyImg.src = s.img;
    document.getElementById("mainTitle").innerText = s.title; document.getElementById("gameOverEmoji").innerText = s.emoji;
}

function logout() { localStorage.removeItem('game_user'); location.reload(); }

async function initOnline() {
    const ch = supabaseClient.channel('presence-game', { config: { presence: { key: sessionID } } });
    ch.on('presence', { event: 'sync' }, () => {
        const count = Object.keys(ch.presenceState()).length;
        document.getElementById("onlineCount").innerText = count;
    }).subscribe(async (s) => { if (s === 'SUBSCRIBED') await ch.track({ user: playerName || 'Гость' }); });
}

const canvas = document.getElementById("game"), ctx = canvas.getContext("2d");
let score = 0, running = false, slowTimer = 0, points = [], hasShield = false, enemyFreezeTimer = 0;
let player = { x: 0, y: 0, r: 25 }, enemy = { x: -200, y: -200, r: 25 };
const playerImg = new Image(); playerImg.src = "https://cdn-icons-png.flaticon.com/512/1946/1946429.png";
const enemyImg = new Image(); 

function spawnPoint() {
    const r = Math.random(); let type = "common";
    if (r > 0.98) type = "shield"; else if (r > 0.94) type = "green"; 
    else if (r > 0.88) type = "yellow"; else if (r > 0.80) type = "epic"; else if (r > 0.70) type = "rare";
    points.push({ x: Math.random() * (canvas.width - 50) + 25, y: Math.random() * (canvas.height - 50) + 25, r: canvas.width * 0.025, type });
}

function update() {
    if (!running) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let speed = (slowTimer > 0) ? 1.5 : (2 + score * 0.1);
    if (slowTimer > 0) { slowTimer--; document.getElementById("slowStatus").style.display = "block"; document.getElementById("slowFrames").innerText = slowTimer; } 
    else { document.getElementById("slowStatus").style.display = "none"; }
    if (enemyFreezeTimer > 0) { enemyFreezeTimer--; } 
    else { let dx = player.x - enemy.x, dy = player.y - enemy.y, dist = Math.hypot(dx, dy); if (dist > 1) { enemy.x += (dx / dist) * speed; enemy.y += (dy / dist) * speed; } }
    points.forEach((p, i) => {
        ctx.beginPath(); ctx.fillStyle = {common:"#8B4513", rare:"#3b82f6", yellow:"#FFD700", epic:"#a855f7", green:"#10b981", shield:"#e5e7eb"}[p.type];
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        if (Math.hypot(player.x - p.x, player.y - p.y) < player.r + p.r) {
            if (p.type === "rare" || p.type === "yellow") { slowTimer += p.type === "rare" ? 40 : 100; triggerFreeze(); }
            if (p.type === "shield") { hasShield = true; }
            score += {common:1, rare:1, yellow:1, epic:3, green:5, shield:5}[p.type];
            document.getElementById("score").innerHTML = "Очки: " + score + (isBoostActive() ? " <span style='color:#f59e0b'>(x2)</span>" : "");
            points.splice(i, 1); spawnPoint(); 
        }
    });
    if (hasShield) { ctx.beginPath(); ctx.arc(player.x, player.y, player.r + 10, 0, Math.PI * 2); ctx.fillStyle = "rgba(59, 130, 246, 0.3)"; ctx.fill(); ctx.strokeStyle = "rgba(59, 130, 246, 0.8)"; ctx.lineWidth = 3; ctx.stroke(); }
    ctx.drawImage(playerImg, player.x - player.r, player.y - player.r, player.r*2, player.r*2);
    ctx.save(); ctx.beginPath(); ctx.arc(enemy.x, enemy.y, enemy.r, 0, Math.PI*2); ctx.clip();
    ctx.drawImage(enemyImg, enemy.x - enemy.r, enemy.y - enemy.r, enemy.r*2, enemy.r*2); 
    if (enemyFreezeTimer > 0) { ctx.fillStyle = "rgba(135, 206, 250, 0.5)"; ctx.fillRect(enemy.x - enemy.r, enemy.y - enemy.r, enemy.r * 2, enemy.r * 2); }
    ctx.restore();
    let distToEnemy = Math.hypot(player.x - enemy.x, player.y - enemy.y);
    if (distToEnemy < player.r + enemy.r * 0.85) {
        if (hasShield) { hasShield = false; enemyFreezeTimer = 175; triggerFreeze(); const side = Math.floor(Math.random() * 4); if(side === 0) { enemy.x = 0; enemy.y = Math.random() * canvas.height; } else if(side === 1) { enemy.x = canvas.width; enemy.y = Math.random() * canvas.height; } else if(side === 2) { enemy.x = Math.random() * canvas.width; enemy.y = 0; } else { enemy.x = Math.random() * canvas.width; enemy.y = canvas.height; } requestAnimationFrame(update); } 
        else { gameOver(); }
    } else requestAnimationFrame(update);
}

function triggerFreeze() { const el = document.getElementById("freezeOverlay"); el.style.opacity = "1"; el.style.transform = "scale(0.5)"; setTimeout(() => { el.style.transition = "all 0.5s"; el.style.transform = "scale(1.5)"; el.style.opacity = "0"; }, 50); el.style.transition = ""; }

async function showLeaderboard() { document.getElementById("leaderboard").style.display = "flex"; document.getElementById("menu").style.display = "none"; loadTab('score'); }

async function loadTab(mode) {
    document.getElementById("btnRec").className = mode === 'score' ? 'tab-btn active' : 'tab-btn';
    document.getElementById("btnSum").className = mode === 'total_score' ? 'tab-btn active' : 'tab-btn';
    document.getElementById("typeLabel").innerText = mode === 'score' ? "Рекорд" : "Сумма";
    const { data } = await supabaseClient.from("leaderboard").select("name, score, total_score").order(mode, { ascending: false }).limit(50);
    document.getElementById("leaderBody").innerHTML = data?.map((p, i) => `<tr><td>${i+1}</td><td style="font-weight:600">${p.name}</td><td style="text-align:right; font-weight:800; color:var(--primary)">${p[mode]}</td></tr>`).join("");
}

function startGame() {
    document.getElementById("menu").style.display = "none"; score = 0; points = []; slowTimer = 0; enemy.x = -200; hasShield = false; enemyFreezeTimer = 0;
    document.getElementById("score").innerHTML = "Очки: 0" + (isBoostActive() ? " <span style='color:#f59e0b'>(x2)</span>" : "");
    for(let i=0; i<9; i++) spawnPoint(); running = true; update();
}

function gameOver() { running = false; saveResults(score); document.getElementById("finalScore").innerText = score; document.getElementById("gameOver").style.display = "flex"; }
function backToMenu() { document.getElementById("gameOver").style.display = "none"; document.getElementById("menu").style.display = "flex"; }
function restart() { document.getElementById("gameOver").style.display = "none"; startGame(); }

window.addEventListener("resize", () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; player.r = Math.min(canvas.width, canvas.height) * 0.06; enemy.r = player.r; });
checkAutoLogin(); initOnline(); window.dispatchEvent(new Event('resize'));
window.addEventListener("mousemove", (e) => { player.x = e.clientX; player.y = e.clientY; });
window.addEventListener("touchmove", (e) => { 
    if (running) {
        player.x = e.touches[0].clientX; player.y = e.touches[0].clientY; e.preventDefault(); 
    }
}, {passive:false});
</script>
